name: Backup Supabase

# Snapshots ALL content + the owner's cloud progress and force-pushes them to a
# dedicated "backups" branch as a SINGLE commit — so there is always exactly one
# snapshot (the newest replaces the old) and nothing accumulates in git history.
# master stays code-only.
#
# One-time setup: repo secret SUPABASE_SERVICE_ROLE_KEY (the project's Secret key).
# View the latest backup: GitHub → branch selector → "backups".

on:
  schedule:
    - cron: '30 3 */3 * *'   # every ~3 days at 03:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://skqarcuggnbjbhpxytmd.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/backup.mjs
      - name: Publish single-commit snapshot to the backups branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan _snap
          git rm -rf --cached . >/dev/null 2>&1 || true
          git add -f backups
          git commit -m "Supabase snapshot"
          git push -f origin _snap:backups
