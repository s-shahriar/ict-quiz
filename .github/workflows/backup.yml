name: Backup Supabase

# Snapshots ALL content + the owner's cloud progress into /backups/*.json and
# commits them (only when something changed). A safety net for the free tier's
# lack of backups. These files are never imported by the app — Vite doesn't
# bundle them, so they add nothing to the shipped site.
#
# One-time setup: add a repo secret SUPABASE_SERVICE_ROLE_KEY
# (Settings → Secrets and variables → Actions → New repository secret) with the
# project's Secret key (Supabase → Settings → API → Secret keys).

on:
  schedule:
    - cron: '30 3 * * *'   # daily at 03:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://skqarcuggnbjbhpxytmd.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node scripts/backup.mjs
      - name: Commit snapshot if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups
          if git diff --cached --quiet; then
            echo "No backup changes."
          else
            git commit -m "chore(backup): snapshot content + owner progress [skip ci]"
            git push
          fi
